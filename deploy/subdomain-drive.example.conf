# Проще подпуть: отдельный поддомен только на gunicorn (без Express для этого хоста).
# 1) DNS: drive.aspc.kz A → IP сервера
# 2) certbot: certbot --nginx -d drive.aspc.kz
# 3) Вставьте этот server { } в sites-enabled (или conf.d), поправьте пути к сертификатов.

server {
    listen 443 ssl http2;
    server_name drive.aspc.kz;

    # ssl_certificate /etc/letsencrypt/live/drive.aspc.kz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/drive.aspc.kz/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }
}

# В .env на сервере для этого варианта:
# APPLICATION_ROOT=
# PUBLIC_BASE_URL=https://drive.aspc.kz
# (без префикса /polytech_drive)

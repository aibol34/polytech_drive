<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Админка{% endblock %} · polytech_drive</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body class="admin-body">
  <div class="admin-shell">
    <aside class="admin-aside">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <div>
          <div class="brand-title">polytech_drive</div>
          <div class="brand-sub">Admin</div>
        </div>
      </div>
      <nav class="admin-nav">
        <a class="nav-link {% if request.endpoint == 'admin_panel.dashboard' %}active{% endif %}" href="{{ url_for('admin_panel.dashboard') }}">Dashboard</a>
        <a class="nav-link {% if request.endpoint in ('admin_panel.clients', 'admin_panel.client_edit') %}active{% endif %}" href="{{ url_for('admin_panel.clients') }}">Клиенты</a>
        <a class="nav-link {% if request.endpoint in ('admin_panel.album_new', 'admin_panel.album_edit') %}active{% endif %}" href="{{ url_for('admin_panel.album_new') }}">Новый альбом</a>
      </nav>
      <div class="aside-footer">
        <form method="post" action="{{ url_for('admin_auth.logout') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn btn-ghost btn-block">Выйти</button>
        </form>
      </div>
    </aside>
    <main class="admin-main">
      {% include "partials/flash.html" %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
